<script>
  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const planet = document.getElementById('planet');
    const offset = scrollY * 0.05; // 揺れの強さ（調整可）
    planet.style.transform = `translateY(${offset}px)`;
  });

function createFloatingStar() {
  const star = document.createElement('div');
  star.className = 'floating-star';
  star.style.left = Math.random() * window.innerWidth + 'px';
  star.style.top = window.innerHeight + 'px';
  star.style.animationDuration = (4 + Math.random() * 3) + 's';
  document.getElementById('floating-stars').appendChild(star);

  setTimeout(() => {
    star.remove();
  }, 7000);
}

setInterval(createFloatingStar, 1000); // ゆっくり舞わせる





const colors = ['#ffffff', '#88bbff', '#ffddcc', '#ffeeaa'];
const glow = ['#88bbff', '#ffccaa', '#ddccff', '#ffeeaa'];

const i = Math.floor(Math.random() * colors.length);
star.style.background = `radial-gradient(circle, ${colors[i]} 0%, transparent 100%)`;
star.style.boxShadow = `0 0 16px ${glow[i]}`;







</script>
