<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>planet illustrations</title>

<style>
body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  background: linear-gradient(to bottom,
    rgba(180, 195, 210, 0.4),
    rgba(150, 170, 190, 0.6),
    rgba(180, 195, 210, 0.4)
  );
  font-family: "Helvetica Neue", "Noto Sans JP", sans-serif;
  color: rgba(255, 255, 255, 0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 4rem;
}

/* タイトル */
h1 {
  font-size: 2.6rem;
  font-weight: 300;
  letter-spacing: 0.3em;
  opacity: 0;
  animation: fadeIn 3s ease forwards, tighten 4s ease forwards 1s;
  margin-bottom: 2rem;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes tighten {
  to { letter-spacing: 0.05em; }
}

/* ギャラリー */
.gallery {
  width: 80%;
  max-width: 900px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 2rem;
  opacity: 0;
  animation: fadeIn 2s ease forwards 1.5s;
}

.gallery img {
  width: 100%;
  border-radius: 8px;
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
  transition: transform 0.4s ease, opacity 0.4s ease;
}

.gallery img:hover {
  transform: scale(1.03);
  opacity: 0.85;
}

/* リンク */
a {
  text-decoration: none !important;
  color: rgba(255, 255, 255, 0.9);
  transition: opacity 0.3s ease;
}

a:hover {
  opacity: 0.6;
}

/* 戻るリンク */
.back {
  margin-top: 3rem;
  font-size: 1.1rem;
  opacity: 0;
  animation: fadeIn 2s ease forwards 2.5s;
}
</style>
</head>

<body>

<h1>illustrations</h1>

<div class="gallery">
  <!-- あなたの画像をここに追加していく -->
  <img src="イラスト1.png" alt="illustration 1">


  <img src="イラスト2.png" alt="illustration 2">

  <img src="イラスト3.png" alt="illustration 3">
<img src="イラスト4.png" alt="illustration 4">
<img src="イラスト5.png" alt="illustration 5">
<img src="イラスト6.png" alt="illustration 6">
<img src="イラスト7.png" alt="illustration 7">
<img src="イラスト8.png" alt="illustration 8">
<img src="イラスト9.png" alt="illustration 9">


</div>

<div class="back">
  <a href="index.html">← back to index</a>
</div>

</body>
</html>
